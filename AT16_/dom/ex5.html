<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voltando elemento escondido</title>
    <style>
        #texto{
            display: none;
        }
    </style>
</head>

<body>
    <p id="texto">Este texto será mostrado</p>
    <button onclick="mostrarTexto()">Mostrar</button>
</body>

<script>
    function esconderTexto() {
        document.getElementById("texto").style.display = "flex";
    }
</script>

</html>
