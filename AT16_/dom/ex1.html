<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Botão que altera texto do parágrafo</title>
</head>

<body>
    <p id="paragrafo">
        Hoje é terça-feira!
    </p>
    <button onclick="alterarTexto()">Altere o texto</button>
    <script>
        function alterarTexto(){
            document.getElementById("paragrafo").innerHTML = "Hoje é quarta-feira!"
        }
    </script>
</body>

</html>
