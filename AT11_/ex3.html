<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floricultura</title>
    <style>
        .grid {
            display: grid;
            grid-template-columns:
                repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .card {
            background-color: rgb(110, 219, 77);
            padding: 20px;
            text-align: center;
            border-radius: 10px;
            transition: 0.3s;
            box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.2);
        }

        .card:hover {
            transform: scale(1.05);
        }

        @media (max-width: 768px) {

            .grid {
                grid-template-columns: repeat(2, 1fr);
            }

        }

        @media (max-width: 480px) {

            .grid {
                grid-template-columns: 1fr;
            }

        }
    </style>
</head>

<body>
    <header id="inicio">
        <h1>Floricultura da Si</h1>
        <a href="#inicio">Início</a> |
        <a href="#flores">Flores</a> |
        <a href="#contato">Contato</a>
    </header>
    <hr>
    <h1>Tipo de flores</h1>
    <main id="flores" class="grid">
        <div class="card">
            <h2>Cravo</h2>
        </div>
        <div class="card">
            <h2>Girassol</h2>
        </div>
        <div class="card">
            <h2>Tulipa</h2>
        </div>
        <div class="card">
            <h2>Margarida</h2>
        </div>
    </main>
    <hr>
    <footer>
        <h3>Floricultura da Si</h3>
        <a href="mailto:sibelly@edu.unifil.br">sibelly@edu.unifil.br</a>
    </footer>
</body>

</html>
