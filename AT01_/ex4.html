<!DOCTYPE html>

        <title>Poema</title>
    </head>
    <body>
       <h1>Poema Livros e Flores de Machado de Assis</h1>
       
        <p>Teus olhos são meus livros.<br>
            Que livro há aí melhor,<br>
            Em que melhor se leia<br>
            A página do amor?<br>
            <br>
            Flores me são teus lábios.<br>
            Onde há mais bela flor,<br>
            Em que melhor se beba<br>
            O bálsamo do amor?</p>

    </body>
</html>
