<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card de apresentação</title>
    <style>
        .card {
            width: 500px;
            margin: 50px auto;
            padding: 20px;
            border: 6px solid black;
            border-radius: 15px;
            box-shadow: 5px 5px 15px gray;
            text-align: center;
        }

        img {
            width: 300px;
            border-radius: 10px;
        }

        a {
            display: inline-block;
            background-color: rgb(228, 133, 149);
            padding: 10px;
            border: 2px solid black;
            border-radius: 10px;
            text-decoration: none;
        }

        a:hover {
            background-color: rgb(234, 99, 121);
        }

        a:visited {
            color: black;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>Sibelly Vitória Antonio</h1>
        <img src="https://avatars.githubusercontent.com/u/133239677?v=4" alt="Imagem de Sibelly">
        <p>
            Meu nome é Sibelly, tenho 19 anos. Sou estudante do 2° ano do curso de bacharelado em ciência da computação
            na UniFil em Londrina PR. Sou bolsista 100% por meio do concurso oportunidade.
        </p>

        <a href="https://sites.google.com/edu.unifil.br/portifolio-sibelly/quem-sou-eu">Ver mais</a>
    </div>

</body>

</html>
